<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <script>
        let nota1 = Number(prompt("Digite aqui a sua primeira nota"));
        let nota2 = Number(prompt("Digite aqui a sua segunda nota"));
        let nota3 = Number(prompt("Digite aqui a sua terceira nota"));

        let media = (nota1 + nota2 + nota3)/3;

        if(media > 6){
            alert("Você foi: Aprovado");
        } else{
            alert("Você foi: Reprovado");
        }
    </script>
</body>
