    <title>Exercício 2</title>

<body>
    <script>
        let num1 = Number(prompt("Digite aqui o primeiro número"));
        let num2 = Number(prompt("Digite aqui o segundo número"));

        let soma = num1 + num2;
        let sub = num1 - num2;
        let mult = num1 * num2;
        let div = num1 / num2;

        alert(soma);
        alert(sub);
        alert(mult);
        alert(div);
            </script>
